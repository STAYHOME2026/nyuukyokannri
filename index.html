  <div class="cd" style="padding:20px 24px">
    <div class="st">基本情報</div>
    <div class="r2">
      <div><label class="fld">氏名 *</label><input id="fn" type="text" value="${v('name')}" placeholder="例：田中 花子"></div>
      <div class="r2" style="margin-bottom:0"><div><label class="fld">年齢</label><input id="fa" type="text" value="${v('age')}" placeholder="例：35 / 40代 / 不明"></div><div><label class="fld">性別</label><select id="fg"><option${(f.gender||'女性')==='女性'?' selected':''}>女性</option><option${f.gender==='男性'?' selected':''}>男性</option></select></div></div>
    </div>
    <div class="r2">
      <div><label class="fld">優先度</label><select id="fp"><option value="1"${f.priority==1?' selected':''}>🔴 高（優先入居）</option><option value="2"${(f.priority||2)==2?' selected':''}>🟡 中</option><option value="3"${f.priority==3?' selected':''}>🟢 低</option></select></div>
      <div><label class="fld">担当者</label><select id="fas">${optH(S.assignees,f.assignee)}</select></div>
    </div>
    <div class="r2">
      <div><label class="fld">対応ステータス</label><select id="fst">${GK.map(g=>`<optgroup label="── ${GRP[g].label}">${S.sts.filter(s=>s.group===g).map(s=>`<option value="${s.value}"${f.status===s.value?' selected':''}>${e(s.label)}</option>`).join('')}</optgroup>`).join('')}</select></div>
      <div><label class="fld">希望ホーム</label><select id="fh">${optH(S.homes,f.preferredHome)}</select></div>
    </div>
    <div class="st">問い合わせ情報</div>
    <div class="r2"><div><label class="fld">電話番号</label><input id="fph" type="tel" value="${v('phone')}" placeholder="075-000-0000"></div><div></div></div>
    <div class="r2"><div><label class="fld">入居希望時期</label><input id="fwt" type="text" value="${v('moveInWish')}" placeholder="例：できるだけ早め / 2026年6月ごろ / 未定"></div><div><label class="fld">初回連絡日</label><input id="fcd2" type="date" value="${v('firstContactDate')}"></div></div>
    <div class="r2"><div><label class="fld">紹介者・連絡してきた方</label><input id="fref" type="text" value="${v('referrer')}" placeholder="例：かけはし・川越病院"></div><div><label class="fld">担当者名</label><input id="frn" type="text" value="${v('referrerName')}" placeholder="例：〇〇様"></div></div>
    <div style="margin-bottom:12px"><label class="fld">障がい・手帳・アレルギーなど</label><input id="fdis" type="text" value="${v('disability')}" placeholder="例：精神手帳2級・ADHD"></div>
    <div class="st">見学・体験・入居</div>
    <div class="r2"><div><label class="fld">見学日時</label><input id="fvd" type="date" value="${v('visitDate')}"></div><div><label class="fld">見学対応者</label><select id="fva"><option value="">— 未定 —</option>${optH(S.assignees,f.visitAssignee)}</select></div></div>
    <div class="r2"><div><label class="fld">体験予定日</label><input id="ftd" type="text" value="${v('trialDate')}" placeholder="例：3/26〜28"></div><div><label class="fld">体験先ホーム</label><select id="fth"><option value="">— 未定 —</option>${optH(S.homes.filter(h=>!['希望無し','その他・未定'].includes(h)),f.trialHome)}</select></div></div>
    <div class="r2"><div><label class="fld">入居予定日</label><input id="fmd" type="text" value="${v('moveInDate')}" placeholder="例：2026/4/1"></div><div><label class="fld">入居先ホーム</label><select id="fmh"><option value="">— 未定 —</option>${optH(S.homes.filter(h=>!['希望無し','その他・未定'].includes(h)),f.moveInHome)}</select></div></div>
    <div class="r2"><div><label class="fld">受給者証有無</label><select id="fbc"><option value="">—</option>${['あり','なし','申請中'].map(o=>`<option${f.benefitsCert===o?' selected':''}>${o}</option>`).join('')}</select></div><div><label class="fld">他社ホーム体験利用</label><select id="fou"><option value="">—</option>${['あり','なし','利用中'].map(o=>`<option${f.otherHomeUse===o?' selected':''}>${o}</option>`).join('')}</select></div></div>
    <div class="st">進捗・備考</div>
    <div style="margin-bottom:12px"><label class="fld" style="color:#DC2626">最終アクション日（連絡・対応のたびに更新）</label><input id="fla" type="date" value="${v('lastActionDate')}" style="border-color:#FCA5A5;background:#FFF7F7"></div>
    <div style="margin-bottom:12px"><label class="fld">進捗状況（時系列で記入）</label><textarea id="fpr" rows="5" placeholder="例：&#10;1/27 見学済み。&#10;2/15 体験日調整中。">${e(f.progress||'')}</textarea></div>
    <div style="margin-bottom:20px"><label class="fld">備考・その他</label><textarea id="fno" rows="3" placeholder="例：家族からの問い合わせ。本人意思確認が必要。">${e(f.notes||'')}</textarea></div>
    <div style="display:flex;gap:10px">
      <button onclick="svCase()" style="flex:1;padding:13px;background:#3B82F6;color:white;border:none;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit">${S.editId?'✓ 更新する':'＋ 登録する'}</button>
      ${S.editId?`<button onclick="dlCase()" style="padding:13px 16px;background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit">削除</button>`:''}
      <button onclick="nav('list')" style="padding:13px 16px;background:#F9FAFB;color:#6B7280;border:1px solid #E5E7EB;border-radius:9px;cursor:pointer;font-size:13px;font-family:inherit">戻る</button>
    </div>
  </div></div>`;}

function settingsH(){
  return`<div class="pg" style="max-width:900px">
  <h2 style="margin:0 0 18px;font-size:17px;font-weight:700;color:#111827">⚙️ 設定</h2>
  <div class="cd" style="padding:22px;margin-bottom:18px">
    <div style="font-weight:700;font-size:15px;color:#111827;margin-bottom:4px">ステータス管理</div>
    <div style="font-size:12px;color:#9CA3AF;margin-bottom:18px">ステータスの追加・削除ができます。デフォルト項目は削除不可です。</div>
    ${GK.map(g=>{const gi=GRP[g],gr=S.sts.filter(s=>s.group===g);return`<div style="margin-bottom:18px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="background:${gi.fill};color:${gi.text};border:1px solid ${gi.border};border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700">${gi.label}</span><span style="font-size:12px;color:#9CA3AF">${gr.length}項目</span></div><div style="display:flex;flex-direction:column;gap:5px">${gr.map(s=>{const ic=s.value.startsWith('custom_');return`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:#F8FAFC;border:1px solid #E5E7EB;border-radius:8px"><span style="flex:1;font-size:13px;color:#111827">${e(s.label)}</span><span style="background:${gi.fill};color:${gi.text};border:1px solid ${gi.border};border-radius:4px;padding:2px 7px;font-size:10px">${gi.label}</span>${ic?`<button onclick="dlSt('${s.value}')" style="background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:6px;padding:3px 9px;font-size:11px;cursor:pointer;font-family:inherit">削除</button>`:'<span style="font-size:10px;color:#D1D5DB">デフォルト</span>'}</div>`;}).join('')}${gr.length===0?'<div style="padding:8px 12px;color:#9CA3AF;font-size:12px">項目なし</div>':''}</div></div>`;}).join('')}
    <div style="margin-top:10px;padding:16px;background:#F8FAFC;border-radius:10px;border:1px solid #E5E7EB">
      <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:12px">＋ 新規ステータスを追加</div>
      <div style="display:grid;grid-template-columns:1fr 160px auto;gap:10px;align-items:flex-end">
        <div><label class="fld">ステータス名</label><input id="nsl" type="text" value="${e(S.nlSt)}" oninput="S.nlSt=this.value" placeholder="例：資料送付済み"></div>
        <div><label class="fld">グループ</label><select id="nsg" onchange="S.ngSt=this.value">${GK.map(g=>`<option value="${g}"${S.ngSt===g?' selected':''}>${GRP[g].label}</option>`).join('')}</select></div>
        <button onclick="addSt()" style="padding:9px 18px;background:#3B82F6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;white-space:nowrap">追加</button>
      </div>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="cd" style="padding:20px"><div style="font-weight:700;font-size:15px;color:#111827;margin-bottom:4px">ホーム一覧</div><div style="font-size:12px;color:#9CA3AF;margin-bottom:14px">希望ホームの選択肢を管理</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">${S.homes.map(h=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border-radius:7px;border:1px solid #E5E7EB"><span style="flex:1;font-size:13px;color:#111827">${e(h)}</span>${!['その他・未定','希望無し'].includes(h)?`<button onclick="dlH('${e(h)}')" style="background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit">削除</button>`:''}</div>`).join('')}</div><div style="display:flex;gap:8px"><input id="nh" type="text" value="${e(S.nhH)}" oninput="S.nhH=this.value" placeholder="ホーム名を入力" style="flex:1"><button onclick="addH()" style="padding:9px 14px;background:#3B82F6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit">追加</button></div></div>
    <div class="cd" style="padding:20px"><div style="font-weight:700;font-size:15px;color:#111827;margin-bottom:4px">担当者一覧</div><div style="font-size:12px;color:#9CA3AF;margin-bottom:14px">担当者の選択肢を管理</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">${S.assignees.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border-radius:7px;border:1px solid #E5E7EB"><span style="flex:1;font-size:13px;color:#111827">${e(a)}</span>${a!=='その他'?`<button onclick="dlA('${e(a)}')" style="background:#FEF2F2;color:#DC2626;border:1px solid #FCA5A5;border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit">削除</button>`:''}</div>`).join('')}</div><div style="display:flex;gap:8px"><input id="na" type="text" value="${e(S.naA)}" oninput="S.naA=this.value" placeholder="担当者名を入力" style="flex:1"><button onclick="addA()" style="padding:9px 14px;background:#3B82F6;color:white;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit">追加</button></div></div>
  </div></div>`;}

function render(){
  const pages={dash:dashH,list:listH,quick:quickH,detail:detailH,settings:settingsH};
  document.getElementById('app').innerHTML=navH()+(pages[S.tab]||dashH)();
}

// Actions
function nav(t){if(t==='detail')S.editId=null;S.tab=t;render();}
function editCase(id){S.editId=id;S.tab='detail';render();}
function g(id){return document.getElementById(id);}

function svCase(){
  const name=(g('fn')||{}).value?.trim();
  if(!name){alert('氏名を入力してください');return;}
  const existing=S.editId?S.cases.find(x=>x.id===S.editId):null;
  const c={
    id:S.editId||gi(),num:existing?.num||(Math.max(0,...S.cases.map(c=>c.num||0))+1),
    name,age:(g('fa')||{}).value||null,gender:(g('fg')||{}).value||'女性',
    priority:parseInt((g('fp')||{}).value)||2,assignee:(g('fas')||{}).value||'その他',
    status:(g('fst')||{}).value||'initial',preferredHome:(g('fh')||{}).value||'その他・未定',
    firstContactDate:(g('fcd2')||{}).value||TODAY_STR,lastActionDate:(g('fla')||{}).value||TODAY_STR,moveInWish:(g('fwt')||{}).value||'',
    phone:(g('fph')||{}).value||'',referrer:(g('fref')||{}).value||'',referrerName:(g('frn')||{}).value||'',
    disability:(g('fdis')||{}).value||'',visitDate:(g('fvd')||{}).value||'',visitAssignee:(g('fva')||{}).value||'',
    trialDate:(g('ftd')||{}).value||'',trialHome:(g('fth')||{}).value||'',
    moveInDate:(g('fmd')||{}).value||'',moveInHome:(g('fmh')||{}).value||'',
    benefitsCert:(g('fbc')||{}).value||'',otherHomeUse:(g('fou')||{}).value||'',
    progress:(g('fpr')||{}).value||'',notes:(g('fno')||{}).value||'',
    createdAt:existing?.createdAt||TODAY_STR
  };
  db.ref('cases/'+c.id).set(c).then(()=>{S.tab='list';});
}

function dlCase(){
  if(!S.editId)return;
  const name=(S.cases.find(c=>c.id===S.editId)||{}).name||'';
  if(!confirm(`「${name}」を削除しますか？`))return;
  db.ref('cases/'+S.editId).remove().then(()=>{S.tab='list';});
}

function qSave(){
  if(!S.qSel)return;
  const tgt=S.cases.find(c=>c.id===S.qSel);if(!tgt)return;
  const at2=AT.find(a=>a.v===S.qAt)||AT[0];
  const line=`${S.qDate} [${at2.i}${at2.l}] ${S.qMemo||'対応済み'}`;
  const u={...tgt,lastActionDate:S.qDate,status:S.qSt||tgt.status,progress:tgt.progress?tgt.progress+'\n'+line:line};
  db.ref('cases/'+u.id).set(u).then(()=>{
    S.qMemo='';S.qSt='';
    const btn=g('qb');if(btn){btn.textContent='✓ 記録しました！';btn.style.background='#16A34A';setTimeout(()=>{btn.textContent='⚡ 対応を記録する';btn.style.background='#0F172A';},2200);}
  });
}

function addSt(){const lbl=(g('nsl')||{}).value?.trim();if(!lbl)return;const nv='custom_'+gi();db.ref('settings/statuses').set([...S.sts.map(s=>({value:s.value,label:s.label,group:s.group})),{value:nv,label:lbl,group:S.ngSt}]).then(()=>{S.nlSt='';});}
function dlSt(v){if(!confirm(`「${(S.sts.find(s=>s.value===v)||{}).label||v}」を削除しますか？`))return;db.ref('settings/statuses').set(S.sts.filter(s=>s.value!==v).map(s=>({value:s.value,label:s.label,group:s.group})));}
function addH(){const h=(g('nh')||{}).value?.trim();if(!h||S.homes.includes(h))return;db.ref('settings/homes').set([...S.homes,h]).then(()=>{S.nhH='';});}
function dlH(h){db.ref('settings/homes').set(S.homes.filter(x=>x!==h));}
function addA(){const a=(g('na')||{}).value?.trim();if(!a||S.assignees.includes(a))return;db.ref('settings/assignees').set([...S.assignees,a]).then(()=>{S.naA='';});}
function dlA(a){db.ref('settings/assignees').set(S.assignees.filter(x=>x!==a));}

// Firebase real-time listeners
db.ref('cases').on('value',snap=>{
  const val=snap.val();
  if(!val){
    const obj={};SEED.forEach(c=>{obj[c.id]=c;});
    db.ref('cases').set(obj);
  } else {
    S.cases=Object.values(val).sort((a,b)=>(a.num||0)-(b.num||0));
    S.loading=false;render();
  }
});
db.ref('settings').on('value',snap=>{
  const val=snap.val()||{};
  if(val.statuses)S.sts=val.statuses;
  if(val.homes)S.homes=val.homes;
  if(val.assignees)S.assignees=val.assignees;
  if(!S.loading)render();
});
</script></body></html>
